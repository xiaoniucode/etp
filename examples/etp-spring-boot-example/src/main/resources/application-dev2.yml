etp:
  client:
    enabled: true
    server-addr: 127.0.0.1 # IP or domain
    auth:
      token: 5E793FAD27AA713D
    connection:
      retry:
        initial-delay: 1
        max-delay: 20
        max-retries: 5
    transport:
      tls:
        enabled: true
        cert-file: classpath:certs/client.crt
        key-file: classpath:certs/client.key
        ca-file: classpath:certs/ca.crt
    proxy:
      custom-domains: test.domain1.com
      basic-auth:
        enabled: true
        users:
          - user: admin
            pass: 123
      transport:
        multiplex: true
        encrypt: true
      bandwidth:
        limit: 2M
      access-control:
        enabled: true
        allow:
          - 127.0.0.1







