<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-box {
            text-align: center;
        }
        input[type="file"] {
            width: 100%;
            padding: 20px;
            border: 2px dashed #3498db;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background: #27ae60;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="upload-box">
        <form id="uploadForm">
            <input type="file" id="fileInput" name="file" accept="*/*">
            <button type="submit">上传</button>
        </form>
        <div id="result" class="result" style="display: none;"></div>
    </div>
    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const file = document.getElementById('fileInput').files[0];
            const resultDiv = document.getElementById('result');
            
            if (!file) {
                resultDiv.textContent = '请选择文件';
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (res.ok && data.success) {
                    resultDiv.textContent = '上传成功';
                    resultDiv.className = 'result success';
                } else {
                    resultDiv.textContent = '上传失败: ' + (data.message || '未知错误');
                    resultDiv.className = 'result error';
                }
                resultDiv.style.display = 'block';
            } catch (err) {
                resultDiv.textContent = '上传出错: ' + err.message;
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
