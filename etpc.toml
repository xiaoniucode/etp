serverAddr = "127.0.0.1"
serverPort = 9527
#认证
[auth]
token = "5E793FAD27AA713D"
[auth.retry]
initialDelay = 2
maxDelay = 8
maxRetries = 3

[mux]
enable=true #全局开启，代理可覆盖
#main_count = 2          # 范围1-8，默认2
#min_count = 2           # 低负载热缩容到2
#max_count = 8

[tls]
enable = false
certFile = "cert/client.crt"
keyFile = "cert/client.key"
caFile = "cert/ca.crt"

[[proxies]]
name = "web1"
protocol = "http"
localIp = "localhost"
localPort = 8081
autoDomain = false
customDomains = ["a.domain1.com"]
status = 1


[[proxies]]
name = "web11"
protocol = "http"
localIp = "localhost"
localPort = 8030
autoDomain = true
subDomains = ["a", "b"]
status = 1
[proxies.basic_auth]
enable = true
users = [
    { user = "user1", pass = "pass1" },
    { user = "user2", pass = "pass2" }
]
[proxies.access_control]
enable = true
mode = "allow"
allow = ["43.135.115.160/32"]
deny = []

[[proxies]]
name = "fullstack2"
protocol = "http"
localIp = "localhost"
localPort = 8091
customDomains = ["etpp.domain2.com"]
status = 1
encrypt = false
compress = false
targets = [
    { host = "127.0.0.1", port = 8090, weight = 70, name = "web-instance-1" },
    { host = "127.0.0.1", port = 8092, weight = 30, name = "web-instance-2" }
]
[proxies.load_balance]
strategy = "random" # roundrobin/weight/random/leastconn
[[proxies]]
name = "web2"
protocol = "http"
localIp = "localhost"
localPort = 8030
customDomains = ["etp.domain2.com"]
encrypt = false
compress = false
[proxies.access_control]
enable = true
mode = "allow"
allow = ["127.0.0.1"]
[proxies.basic_auth]
enable = true
users = [
    { user = "user1", pass = "123" },
    { user = "user2", pass = "456" }
]
[[proxies]]
name = "web22"
protocol = "http"
localIp = "localhost"
localPort = 8030
customDomains = ["etp2.domain2.com"]
encrypt = false
compress = false

[proxies.bandwidth] #带宽限制
limit = "20M" #总带宽限制(可选)
limitIn = "2M" #入口带宽限制(可选)
limitOut = "2M" #出口带宽限制(可选)
[[proxies]]
name = "mysql"
protocol = "tcp"
localPort = 3306
remotePort = 3307
status = 1
encrypt = false
compress = false

[proxies.access_control] #访问控制
enable = true
mode = "allow"
allow = ["127.0.0.1"]
deny = []
[[proxies]]
name = "mysql2"
protocol = "tcp"
localPort = 3306
remotePort = 3308
status = 1
encrypt = false
compress = false
targets = [
    { host = "127.0.0.1", port = 8090, weight = 70, name = "web-instance-1" },
    { host = "127.0.0.1", port = 8092, weight = 30, name = "web-instance-2" }
]
[[proxies]]
name = "redis"
protocol = "tcp"
localPort = 6379
remotePort = 6380
status = 1
encrypt = true
compress = true
targets = [
    { host = "10.1.1.2", port = 6379, weight = 70, name = "redis-1" },
    { host = "10.1.1.1", port = 6379, weight = 30, name = "redis-2" }
]
[proxies.loadbalance]
strategy = "weight" # 策略：roundrobin/weight/random/leastconn
#日志
[log]
level = "debug"
path = "log"
name = "etpc.log"
archivePattern = "etpc.%d{yyyy-MM-dd}.log"
logPattern = "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
maxHistory = 30
totalSizeCap = "3GB"