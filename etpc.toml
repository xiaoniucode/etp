[[proxies]]
name = "mysql2"
protocol = "tcp"
status = 1
remotePort = 3309
targets = [
    { host = "127.0.0.1", port = 3306, weight = 70, name = "mysql-instance-1" },
    { host = "127.0.0.1", port = 3306, weight = 90, name = "mysql-instance-2" }
]
[proxies.transport]
mux = true
compress = false
encrypt = false
[proxies.loadbalance]
strategy = "roundrobin" # 策略：roundrobin/weight/random/leastconn

[proxies.bandwidth] #带宽限制
limit = "128k" #总带宽限制(可选)
limitIn = "64k" #入口带宽限制(可选)
limitOut = "64k" #出口带宽限制(可选)
