serverAddr = "localhost"
serverPort = 9527
#认证
[auth]
token = "5E793FAD27AA713D"
[auth.retry]
initialDelay = 2
maxDelay = 8
maxRetries = 3

[mux]
enable = true #全局开启，代理可覆盖

[tls]
enable = false
certFile = "cert/openssl/client.crt"
keyFile = "cert/openssl/client.key"
caFile = "cert/openssl/ca.crt"

[[proxies]]
name = "web1"
protocol = "http"
autoDomain = false
customDomains = ["a.domain1.com"]
status = 1

[[proxies]]
name = "web11"
protocol = "http"
autoDomain = true
subDomains = ["a", "b"]
status = 1
mux = false
[proxies.basic_auth]
enable = true
users = [
    { user = "user1", pass = "pass1" },
    { user = "user2", pass = "pass2" }
]
[proxies.access_control]
enable = true
mode = "allow"
allow = ["43.135.115.160/32"]
deny = []



[[proxies]]
name = "fullstack2"
protocol = "http"
customDomains = ["etpp.domain2.com"]
enable = true
targets = [
    { host = "127.0.0.1", port = 8090, weight = 70, name = "web-instance-1" },
    { host = "127.0.0.1", port = 8092, weight = 30, name = "web-instance-2" }
]

[proxies.load_balance]
strategy = "random" # 负载均衡策略 roundrobin/weight/random/leastconn
[proxies.health_check]
enable = true
interval = 5 #检查间隔
timeout = 2 #连接超时
maxFail = 3

[proxies.transport]
mux = false
compress = false
encrypt = true

[proxies.access_control]
enable = true
mode = "allow"
allow = ["43.135.115.160/32"]
deny = []

[proxies.bandwidth]
limit = "20M" #总带宽限制(可选) 20Mbps
limitIn = "2M" #入口带宽限制(可选)
limitOut = "2M" #出口带宽限制(可选)






[[proxies]]
name = "web2"
protocol = "http"
customDomains = ["etp.domain2.com"]
encrypt = false
compress = false
[proxies.access_control]
enable = true
mode = "allow"
allow = ["127.0.0.1"]
[proxies.basic_auth]
enable = true
users = [
    { user = "user1", pass = "123" },
    { user = "user2", pass = "456" }
]
[[proxies]]
name = "web22"
protocol = "http"
customDomains = ["etp2.domain2.com"]
encrypt = false
compress = false

[proxies.bandwidth] #带宽限制
limit = "20M" #总带宽限制(可选)
limitIn = "2M" #入口带宽限制(可选)
limitOut = "2M" #出口带宽限制(可选)
[[proxies]]
name = "mysql"
protocol = "tcp"
status = 1
encrypt = false
compress = false

[proxies.access_control] #访问控制
enable = true
mode = "allow"
allow = ["127.0.0.1"]
deny = []
[[proxies]]
name = "mysql2"
protocol = "tcp"
status = 1
encrypt = false
compress = false
remotePort = 3307
targets = [
    { host = "127.0.0.1", port = 8090, weight = 70, name = "web-instance-1" },
    { host = "127.0.0.1", port = 8092, weight = 30, name = "web-instance-2" }
]
[[proxies]]
name = "redis"
protocol = "tcp"
status = 1
encrypt = true
compress = true
targets = [
    { host = "10.1.1.2", port = 6379, weight = 70, name = "redis-1" },
    { host = "10.1.1.1", port = 6379, weight = 30, name = "redis-2" }
]
[proxies.loadbalance]
strategy = "weight" # 策略：roundrobin/weight/random/leastconn
#日志
[log]
level = "debug"
path = "log"
name = "etpc.log"
archivePattern = "etpc.%d{yyyy-MM-dd}.log"
logPattern = "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
maxHistory = 30
totalSizeCap = "3GB"