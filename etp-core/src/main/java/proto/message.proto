syntax = "proto3";

package com.xiaoniucode.etp.core.message;

enum MessageType {
  UNKNOWN = 0;
  LOGIN = 101;
  LOGIN_RESP = 104;
  NEW_PROXY = 102;
  CLOSE_PROXY = 103;
  PING = 105;
  NEW_PROXY_RESP = 202;
  ERROR = 205;
  PONG = 206;
  KICKOUT = 301;
  NEW_VISITOR = 302;
  NEW_VISITOR_RESP = 303;
  HEARTBEAT_TIMEOUT = 304;
}

enum ProtocolType {
  TCP = 0;
  HTTP = 1;
}
enum ClientType{
  BINARY_DEVICE = 0;
  WEB_SESSION = 1;
}
enum AccessMode {
  ALLOW = 0;
  DENY = 1;
}
enum LoadBalanceStrategy {
  ROUND_ROBIN = 0;
  WEIGHT = 1;
  RANDOM = 2;
  LEAST_CONN = 3;
}
message MessageHeader {
  MessageType type = 1;
}

message Login {
  string client_id = 1;
  string token = 2;
  string name = 3;
  ClientType client_type = 4;
  optional string version = 5;
  optional string os = 6;
  optional string arch = 7;
}
message LoginResp {
  string session_id = 1;
}

message AccessControl {
  bool enable = 1;
  AccessMode mode = 2;
  repeated string allow = 3;
  repeated string deny = 4;
}

message HttpUser {
  string user = 1;
  string pass = 2;
}

message BasicAuth {
  bool enable = 1;
  repeated HttpUser http_users = 2;
}

message Bandwidth {
  optional string limit = 1;
  optional string limit_in = 2;
  optional string limit_out = 3;
}

message Target {
  string host = 1;
  int32 port = 2;
  optional string name = 4;
  optional int32 weight = 5;
}

message LoadBalance{
  optional LoadBalanceStrategy strategy = 1;
}
message NewProxy {
  string name = 1;
  repeated Target targets = 2;
  optional int32 status = 3;
  optional bool encrypt = 4;
  optional bool compress = 5;
  ProtocolType protocol = 6;
  optional int32 remote_port = 7;
  optional bool auto_domain = 8;
  repeated string custom_domains = 9;
  repeated string sub_domains = 10;
  optional AccessControl access_control = 11;
  optional BasicAuth basic_auth = 12;
  optional Bandwidth bandwidth = 13;
  optional LoadBalance load_balance = 14;
}
message NewProxyResp {
  string proxy_name = 1;
  string remote_addr = 2;
}

message CloseProxy {
  string session_id = 1;
}

message NewVisitorConn {
  string session_id = 1;
  string local_ip = 2;
  int32 local_port = 3;
  optional bool encrypt = 4;
  optional bool compress = 5;
}

message NewVisitorConnResp {
  string session_id = 2;
}

message Error {
  int32 code = 1;
  string message = 2;
}
message HeartbeatTimeout{}
message Ping {}
message Pong {}

message Kickout {}

message ControlMessage {
  MessageHeader header = 1;
  oneof payload {
    Login login = 10;
    NewProxy new_proxy = 11;
    CloseProxy close_proxy = 12;
    Ping ping = 13;
    NewProxyResp new_proxy_resp = 20;
    Error error = 21;
    Pong pong = 22;
    Kickout kickout = 30;
    NewVisitorConn new_visitor_conn = 31;
    NewVisitorConnResp new_visitor_conn_resp = 32;
    LoginResp login_resp = 33;
    HeartbeatTimeout heartbeat_timeout = 34;
  }
}